name: Release

on:
  workflow_call:
    outputs:
      release-created:
        description: Has the release been created
        value: ${{ jobs.release.outputs.release-created }}
      tag_name:
        description: Released version tag
        value: ${{ jobs.release.outputs.tag_name }}
      major-tag:
        description: Major version tag
        value: ${{ jobs.release.outputs.major-tag }}
      minor-tag:
        description: Minor version tag
        value: ${{ jobs.release.outputs.minor-tag }}
      patch-tag:
        description: Patch version tag
        value: ${{ jobs.release.outputs.patch-tag }}
      version:
        description: Version number without v prefix
        value: ${{ jobs.release.outputs.version }}

jobs:
  release:
    name: Release application
    runs-on: ubuntu-24.04
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      major-tag: ${{ steps.release.outputs.major }}
      minor-tag: ${{ steps.release.outputs.minor }}
      patch-tag: ${{ steps.release.outputs.patch }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    permissions:
      contents: write
      pull-requests: write
      packages: write
    if: >-
      ${{
        !contains(github.event.head_commit.message, '[skip gha]') &&
        !github.event.forced &&
        (github.ref_name == 'main' || github.ref_name == 'dev')
      }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Release Please
        uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: ${{ github.ref_name }}
          manifest-file: ${{ github.ref_name == 'dev' &&
            '.release-please-manifest-prerelease.json' ||
            '.release-please-manifest.json' }}
          config-file: ${{ github.ref_name == 'dev' &&
            'release-please-config-prerelease.json' ||
            'release-please-config-release.json' }}

      - name: Set registry prefix (lowercase)
        if: ${{ steps.release.outputs.release_created == 'true' }}
        id: registry
        shell: bash
        run: echo "prefix=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/server/api/Dockerfile
          target: base
          push: true
          tags: |
            ${{ steps.registry.outputs.prefix }}/abrege-api:${{ steps.release.outputs.version }}
            ${{ steps.registry.outputs.prefix }}/abrege-api:${{ steps.release.outputs.tag_name }}
            ${{ steps.registry.outputs.prefix }}/abrege-api:latest

      - name: Build and push service image
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/server/abrege_service/Dockerfile
          target: builder
          push: true
          tags: |
            ${{ steps.registry.outputs.prefix }}/abrege-service:${{ steps.release.outputs.version }}
            ${{ steps.registry.outputs.prefix }}/abrege-service:${{ steps.release.outputs.tag_name }}
            ${{ steps.registry.outputs.prefix }}/abrege-service:latest

      - name: Build and push client image
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: apps/client
          file: apps/client/Dockerfile
          target: prod
          push: true
          tags: |
            ${{ steps.registry.outputs.prefix }}/abrege-frontend:${{ steps.release.outputs.version }}
            ${{ steps.registry.outputs.prefix }}/abrege-frontend:${{ steps.release.outputs.tag_name }}
            ${{ steps.registry.outputs.prefix }}/abrege-frontend:latest

      - name: Build and push migration image
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/server/migration/Dockerfile
          push: true
          tags: |
            ${{ steps.registry.outputs.prefix }}/abrege-migration:${{ steps.release.outputs.version }}
            ${{ steps.registry.outputs.prefix }}/abrege-migration:${{ steps.release.outputs.tag_name }}
            ${{ steps.registry.outputs.prefix }}/abrege-migration:latest
