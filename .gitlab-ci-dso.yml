include:
  - project: $CATALOG_PATH
    file: vault-ci.yml
    ref: main
  - project: $CATALOG_PATH
    file: kaniko-ci.yml
    ref: main

default:
  image: alpine:latest

variables:
  TAG: "${CI_COMMIT_REF_SLUG}"
  REGISTRY_URL: "${REGISTRY_HOST}/${PROJECT_PATH}"

stages:
  - read-secret
  - docker-build

read_secret:
  stage: read-secret
  extends:
    - .vault:read_secret

docker-build-abrege-api:
  stage: docker-build
  extends:
    - .kaniko:build-push
  variables:
    DOCKERFILE: "apps/server/api/Dockerfile"
    IMAGE_NAMES: ""  # Overridden in before_script
    EXTRA_BUILD_ARGS: "--build-arg DOCKERHUB_MIRROR_URL=${DOCKERHUB_MIRROR_URL}"
  rules:
    - when: always
  before_script:
    - |
      SHORT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
      TAGS="abrege-api:$SHORT_SHA"
      TAGS="$TAGS abrege-api:$CI_COMMIT_REF_SLUG"
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAG_WITHOUT_V=${CI_COMMIT_TAG#v}
        TAGS="$TAGS abrege-api:$TAG_WITHOUT_V"
        if echo "$CI_COMMIT_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
          TAGS="$TAGS abrege-api:latest"
        fi
      elif [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAGS="$TAGS abrege-api:latest"
      fi
      export IMAGE_NAMES="$TAGS"
      echo "Building with tags: $IMAGE_NAMES"

