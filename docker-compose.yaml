services:
  minio:
    image: minio/minio:latest
    container_name: minio_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis_dev
    ports:
      - "6379:6379"
    restart: unless-stopped

  abrege_service:
    deploy:
      replicas: 1
    command:
      [
        "celery",
        "-A",
        "abrege_service.main",
        "worker",
        "--loglevel=info",
        "--pool=prefork",
        "--concurrency=1",
        "-E",
      ]
    image: abrege-service
    mem_limit: 1g
    volumes:
      - ./apps/server/abrege_service/:/app/abrege_service/
      - ./apps/server/src/:/app/src/
      - ./apps/server/tests/:/app/tests/
    build:
      target: test
      context: .
      dockerfile: apps/server/abrege_service/Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_API_MODEL=${OPENAI_API_MODEL}
      - SERVER_API_KEY=test-api-key
      - SERVER_BASE_URL=http://abrege-api:5000
      - EMBEDDING_MODEL=bge-multilingual-gemma2
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
      abrege_api:
        condition: service_healthy

  abrege_api:
    image: abrege-api
    build:
      context: .
      dockerfile: apps/server/api/Dockerfile
      target: dev
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request;
            urllib.request.urlopen('http://localhost:5000/api/health')\" || exit
            1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    ports:
      - 5000:5000
    volumes:
      - ./apps/server/api/:/app/api/
      - ./apps/server/src/:/app/src/
      - ./apps/server/tests/:/app/tests/
    container_name: abrege-api
    environment:
      DEV_MODE: "true"
      CELERY_APP_NAME: default
      DATABASE_URL: postgresql://postgres:secret@db:5432/example_db
      DATABASE_ASYNC_URL: postgresql+asyncpg://postgres:secret@db:5432/example_db
      API_KEYS: test-api-key
      EMBEDDING_MODEL: bge-multilingual-gemma2
    depends_on:
      redis:
        condition: service_started
      minio:
        condition: service_started
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    env_file:
      - .env
  db:
    image: postgres:15
    container_name: postgres
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h localhost -p 5432" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: example_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  migration:
    image: abrege-migration
    build:
      context: .
      dockerfile: apps/server/migration/Dockerfile
    command:
      - alembic
      - upgrade
      - head
    container_name: abrege-migration
    volumes:
      - ./apps/server/src/:/app/src/
      - ./apps/server/migration/:/app/migration
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  abrege_frontend:
    container_name: abrege_frontend
    restart: always
    working_dir: /app
    build:
      context: ./apps/client
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      - VITE_SSO_BYPASS=true
      - VITE_API_KEY=test-api-key
    ports:
      - 8082:3000
    volumes:
      - ./apps/client:/app
      - /app/node_modules
volumes:
  minio_data:
    driver: local

  postgres_data:
    driver: local
