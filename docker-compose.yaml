services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data
    restart: unless-stopped

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: unless-stopped

  abrege_service:
    deploy:
      replicas: 1
    command:
      [
        "celery",
        "-A",
        "abrege_service.main",
        "worker",
        "--loglevel=info",
        "--pool=prefork",
        "--concurrency=1",
        "-E",
      ]
    image: abrege-service
    mem_limit: 1g
    volumes:
      - ./apps/server/abrege_service/:/app/abrege_service/
      - ./apps/server/src/:/app/src/
      - ./apps/server/tests/:/app/tests/
    build:
      target: test
      context: .
      dockerfile: apps/server/abrege_service/Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_API_MODEL=${OPENAI_API_MODEL}
    env_file:
      - .env

  # flower_abrege:
  #   image: abrege-service
  #   ports:
  #     - "5555:5555"
  #   command:
  #     [
  #       "celery",
  #       "-A",
  #       "abrege_service.main",
  #       "flower",
  #       "--address=0.0.0.0",
  #       "--port=5555",
  #     ]
  #   env_file:
  #     - .env

  abrege_api:
    image: abrege-api
    build:
      context: .
      dockerfile: apps/server/api/Dockerfile
    ports:
      - 5000:5000
    volumes:
      - ./apps/server/api/:/app/api/
      - ./apps/server/src/:/app/src/
      - ./apps/server/tests/:/app/tests/
    environment:
      DEV_MODE: "true"
      CELERY_APP_NAME: default
      VERIFY_TOKEN_MODEL: full-access
    depends_on:
      - redis
      - minio
      - db
    env_file:
      - .env
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: example_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
  migration:
    image: abrege-migration
    build:
      context: .
      dockerfile: apps/server/migration/Dockerfile
    command:
      - alembic
      - upgrade
      - head
    volumes:
      - ./apps/server/src/:/app/src/
      - ./apps/server/migration/:/app/migration
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  abrege_frontend:
    restart: always
    working_dir: /app
    build:
      context: ./apps/client
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    ports:
      - 8082:3000
    volumes:
      - ./apps/client:/app
      - /app/node_modules

  # llm_guard_api:
  #   image: laiyer/llm-guard-api:latest
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - AUTH_TOKEN=llm_guard
  #     - LOG_LEVEL=DEBUG
  #   volumes:
  #     - ./apps/server/llm-guard/config/scanners.yml:/home/user/app/config/scanners.yml

volumes:
  minio_data:
    driver: local

  postgres_data:
    driver: local
